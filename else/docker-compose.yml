services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-tramplin}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./tramplin.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  web:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_WAIT_TIMEOUT: "60"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  db_data:
