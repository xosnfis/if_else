<div class="flex items-center gap-5">
  <!-- Preview circle -->
  <div class="relative group flex-shrink-0">
    <div id="avatar-preview-wrap"
         class="w-20 h-20 rounded-2xl overflow-hidden flex items-center justify-center cursor-pointer"
         style="background:#EFF6FF;border:2px solid #BFDBFE;"
         onclick="document.getElementById('avatar-file-input').click()"
         title="Нажмите, чтобы загрузить фото">
      {% if user.avatar %}
      <img id="avatar-preview-img" src="{{ user.avatar.url }}"
           alt="Фото профиля"
           class="w-20 h-20 object-cover">
      {% else %}
      <img id="avatar-preview-img" src="" alt="" class="w-20 h-20 object-cover hidden">
      <span id="avatar-preview-initial" class="text-3xl font-bold" style="color:#2563EB;">
        {{ user.display_name|first|upper|default:"?" }}
      </span>
      {% endif %}
    </div>
    <!-- Camera overlay on hover -->
    <div class="absolute inset-0 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer"
         style="background:rgba(37,99,235,0.5);"
         onclick="document.getElementById('avatar-file-input').click()">
      <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
  </div>

  <!-- Controls -->
  <div class="flex flex-col gap-2">
    <!-- Hidden upload form -->
    <form method="post" action="{{ form_action }}" enctype="multipart/form-data" id="avatar-upload-form">
      {% csrf_token %}
      <input type="hidden" name="action" value="upload_avatar">
      <input type="file" id="avatar-file-input" name="avatar"
             accept="image/jpeg,image/png,image/webp"
             class="hidden"
             onchange="previewAvatar(this)">
    </form>

    <button type="button"
            onclick="document.getElementById('avatar-file-input').click()"
            class="btn btn-ghost btn-sm flex items-center gap-1.5">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
      </svg>
      Загрузить фото
    </button>

    {% if user.avatar %}
    <form method="post" action="{{ form_action }}">
      {% csrf_token %}
      <input type="hidden" name="action" value="delete_avatar">
      <button type="submit" class="btn btn-danger btn-sm flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Удалить
      </button>
    </form>
    {% endif %}

    <p class="text-xs" style="color:#94A3B8;">JPG, PNG, WEBP · до 2 МБ</p>
  </div>
</div>

<script>
function previewAvatar(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = document.getElementById('avatar-preview-img');
    var initial = document.getElementById('avatar-preview-initial');
    img.src = e.target.result;
    img.classList.remove('hidden');
    if (initial) initial.style.display = 'none';
    document.getElementById('avatar-upload-form').submit();
  };
  reader.readAsDataURL(input.files[0]);
}
</script>
